<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediksi Harga Rumah Dengan Machine Learning</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Montserrat',sans-serif;
        }

        body{
            min-height:100vh;
            background: linear-gradient(
                135deg,
                #2563eb 0%,
                #4f46e5 50%,
                #7c3aed 100%
            );
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px 20px;
        }

        .container{
            width:100%;
            max-width:1000px;
        }

        .card{
            background:rgba(255,255,255,0.12);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border:1px solid rgba(255,255,255,0.2);
            border-radius:24px;
            padding:40px;
            box-shadow:0 20px 40px rgba(0,0,0,0.2);
        }

        .title{
            text-align:center;
            color:white;
            font-size:2rem;
            font-weight:800;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:rgba(255,255,255,0.85);
            margin-bottom:35px;
            line-height:1.6;
        }

        .form-group{
            display:grid;
            grid-template-columns: 1fr 220px;
            gap:15px;
            align-items:center;
            margin-bottom:16px;
        }

        .form-group label{
            color:white;
            font-size:14px;
            font-weight:500;
            line-height:1.4;
        }

        .form-group input{
            width:100%;
            padding:12px 16px;
            border:none;
            outline:none;
            border-radius:12px;
            background:rgba(255,255,255,0.95);
            font-size:14px;
            transition:0.3s;
        }

        .form-group input:focus{
            transform:scale(1.02);
            box-shadow:0 0 0 4px rgba(255,255,255,0.25);
        }

        .btn{
            width:100%;
            padding:16px;
            margin-top:20px;
            border:none;
            border-radius:14px;
            cursor:pointer;
            font-size:16px;
            font-weight:700;
            color:white;
            background:linear-gradient(
                135deg,
                #06b6d4,
                #2563eb,
                #7c3aed
            );
            transition:all .3s ease;
        }

        .btn:hover{
            transform:translateY(-3px);
            box-shadow:0 15px 25px rgba(0,0,0,0.25);
        }

        .prediction{
            margin-top:25px;
            padding:20px;
            border-radius:16px;
            background:rgba(255,255,255,0.15);
            color:white;
            text-align:center;
            font-size:20px;
            font-weight:700;
        }

        @media(max-width:768px){

            .card{
                padding:25px;
            }

            .title{
                font-size:1.5rem;
            }

            .form-group{
                grid-template-columns:1fr;
            }

            .form-group label{
                margin-bottom:5px;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1 class="title">
            Prediksi Harga Rumah Dengan Machine Learning
        </h1>

        <p class="subtitle">
            Masukkan parameter karakteristik rumah dan lingkungan untuk
            memprediksi harga rumah.
        </p>

        <form action="{{ url_for('predict') }}" method="post">

            <div class="form-group">
                <label>Tingkat kriminal per kapita</label>
                <input type="text" name="CRIM" required>
            </div>

            <div class="form-group">
                <label>Proporsi area residensial per suatu area</label>
                <input type="text" name="ZN" required>
            </div>

            <div class="form-group">
                <label>Proporsi area bisnis non-retail</label>
                <input type="text" name="INDUS" required>
            </div>

            <div class="form-group">
                <label>Apakah berada di tepi sungai</label>
                <input type="text" name="CHAS" required>
            </div>

            <div class="form-group">
                <label>Tingkat polusi nitric oxides</label>
                <input type="text" name="NOX" required>
            </div>

            <div class="form-group">
                <label>Rata-rata jumlah kamar per rumah</label>
                <input type="text" name="RM" required>
            </div>

            <div class="form-group">
                <label>Umur bangunan rumah</label>
                <input type="text" name="Age" required>
            </div>

            <div class="form-group">
                <label>Rata-rata jarak rumah ke pusat bisnis</label>
                <input type="text" name="DIS" required>
            </div>

            <div class="form-group">
                <label>Akses ke jalan utama</label>
                <input type="text" name="RAD" required>
            </div>

            <div class="form-group">
                <label>Rata-rata pajak rumah</label>
                <input type="text" name="TAX" required>
            </div>

            <div class="form-group">
                <label>Rasio jumlah murid terhadap guru</label>
                <input type="text" name="PTRATIO" required>
            </div>

            <div class="form-group">
                <label>Indeks proporsi penduduk</label>
                <input type="text" name="B" required>
            </div>

            <div class="form-group">
                <label>Persentase populasi berstatus ekonomi rendah</label>
                <input type="text" name="LSTAT" required>
            </div>

            <button type="submit" class="btn">
                Prediksi Harga Rumah
            </button>

        </form>

        {% if prediction_text %}
        <div class="prediction">
            {{ prediction_text }}
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
